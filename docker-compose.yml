name: alpimonitor

services:
  postgres:
    image: postgres:16-alpine
    container_name: alpimonitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - alpimonitor-pgdata:/var/lib/postgresql/data
    networks:
      - alpimonitor-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile.dev
    container_name: alpimonitor-api
    restart: unless-stopped
    env_file: .env
    ports:
      - '${PORT}:${PORT}'
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/shared:/app/packages/shared
      # Anonymous volumes preserve container-installed node_modules
      # against the bind-mount overlay above.
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
    networks:
      - alpimonitor-net
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: alpimonitor-web
    restart: unless-stopped
    environment:
      # chokidar (used by Vite) needs polling for reliable file-watching
      # through Docker bind-mounts on Linux hosts.
      CHOKIDAR_USEPOLLING: 'true'
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - /app/apps/web/node_modules
      - /app/packages/shared/node_modules
    networks:
      - alpimonitor-net

volumes:
  alpimonitor-pgdata:

networks:
  alpimonitor-net:

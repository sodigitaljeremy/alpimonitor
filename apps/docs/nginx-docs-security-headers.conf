# Security headers for the docs.alpimonitor.fr vhost.
#
# Derived from apps/web/nginx-security-headers.conf (main app) and
# apps/web/nginx-storybook-security-headers.conf (Storybook). Diverges
# in the CSP only, for two reasons specific to MkDocs Material + Mermaid:
#
#   - `script-src https://unpkg.com` : mkdocs-mermaid2-plugin loads
#     mermaid.esm.min.mjs from unpkg.com at runtime (pinned 10.9.1 in
#     mkdocs.yml). Omitting this URL breaks every embedded diagram.
#   - `script-src 'unsafe-inline'`  : mkdocs-material ships a bootstrap
#     inline script (`<script>…</script>`) that reads palette prefs
#     from localStorage before the main bundle loads — standard for
#     Material themes and documented in their CSP guide.
#   - `style-src 'unsafe-inline'`   : Material runtime applies a few
#     inline styles (theme toggle transitions, sidebar state).
#   - `style-src https://fonts.googleapis.com` + `font-src https://fonts.gstatic.com`
#     : Material loads Roboto by default. Could be self-hosted with
#     extra config; kept as CDN for now.
#   - `frame-ancestors 'none'`      : the docs site is not meant to be
#     embedded. Same posture as the main app.
#
# Every other header matches the main app's security posture.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

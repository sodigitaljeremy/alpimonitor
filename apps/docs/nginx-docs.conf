server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  # Security headers for docs.alpimonitor.fr — see the adjacent file for
  # why the CSP differs from the main app's (Mermaid CDN JS from unpkg,
  # inline styles for mkdocs-material runtime). Re-included in every
  # location that declares its own `add_header`, because nginx does not
  # merge parent add_headers into children that introduce new ones.
  include /etc/nginx/docs-security-headers.conf;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # MkDocs emits hashed CSS/JS bundles under assets/javascripts/ and
  # assets/stylesheets/ — safe to cache immutably. C4 SVGs under
  # assets/diagrams/ are content-hashed by the contributor (regen writes
  # a new SVG in the same filename), so they get the standard 1y cache.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    include /etc/nginx/docs-security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # `search/` holds the lunr search index plus runtime glue. MkDocs
  # regenerates it on every build, hashed alongside the main bundle.
  location /search/ {
    try_files $uri =404;
    expires 1h;
    include /etc/nginx/docs-security-headers.conf;
    add_header Cache-Control "public, max-age=3600";
  }

  # Pretty URLs from `use_directory_urls: true` (Material default):
  # `/09-architectural-decisions/adr-007/` → try folder then fall back
  # to index.html for the 404 page (404.html is served as the default
  # fallback for any unknown path).
  location / {
    try_files $uri $uri/ /404.html;
  }

  # Section index pages reference the hashed asset bundles — never
  # cache the HTML itself.
  location ~* \.html$ {
    include /etc/nginx/docs-security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /sitemap.xml {
    include /etc/nginx/docs-security-headers.conf;
    add_header Cache-Control "public, max-age=3600";
  }
}

# Security headers for the Storybook-static vhost.
#
# Kept separate from apps/web/nginx-security-headers.conf (which serves
# alpimonitor.fr) because Storybook has two hard constraints the main
# app does not:
#   - the manager embeds the preview as a same-origin iframe, so
#     `frame-ancestors` must allow `'self'` (the main app uses `'none'`),
#   - the compiled preview bundle evaluates MDX and docgen data via
#     `new Function(...)`, so `script-src` needs `'unsafe-eval'`
#     (the main app does not).
# Every other header matches the main app's security posture.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content-Security-Policy tuned for Storybook-static:
#   script-src 'unsafe-inline' 'unsafe-eval' : Storybook inline bootstrap +
#                                              Function() for MDX / docgen
#   style-src 'unsafe-inline'                : Vue <style scoped> + Storybook UI
#   style-src https://fonts.googleapis.com   : Nunito (Storybook manager) +
#                                              Inter / JetBrains Mono (previews)
#   font-src  https://fonts.gstatic.com      : Google Fonts font files
#   img-src   data: blob:                    : Storybook uses blob: for
#                                              dynamic component snapshots
#   connect-src 'self'                       : manager/preview channel only —
#                                              no external API (stories stub
#                                              fetch via Pinia decorators)
#   worker-src 'self' blob:                  : Storybook dev workers
#   frame-src  'self'                        : preview iframe loads same-origin
#   frame-ancestors 'self'                   : manager embeds preview iframe
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; worker-src 'self' blob:; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  # Security headers. Also re-included in every location block below that
  # declares its own add_header — nginx does not merge parent add_headers
  # into children that introduce new ones. See nginx-security-headers.conf.
  include /etc/nginx/security-headers.conf;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Hashed asset filenames emitted by Vite → safe to cache immutably.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback: unmatched paths serve index.html so Vue Router handles them.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html itself must not be cached — it references the hashed bundles.
  location = /index.html {
    include /etc/nginx/security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}

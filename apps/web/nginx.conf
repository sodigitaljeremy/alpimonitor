server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security-ish defaults (kept minimal; TLS + HSTS are handled by Traefik/Coolify).
  server_tokens off;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Hashed asset filenames emitted by Vite → safe to cache immutably.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA fallback: unmatched paths serve index.html so Vue Router handles them.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html itself must not be cached — it references the hashed bundles.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}

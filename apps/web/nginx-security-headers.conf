# Security headers applied to every response.
#
# Included from the `server` block AND each `location` that defines its own
# `add_header`, because nginx REPLACES (not merges) parent `add_header`
# directives as soon as a child block declares any of its own — cf.
# http://nginx.org/en/docs/http/ngx_http_headers_module.html#add_header.
# Keeping them here in a single snippet is the DRY alternative to repeating
# six identical directives in every location.

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content-Security-Policy — origins actually used by the app:
#   script-src 'unsafe-inline'         : Vue/Vite emit inline handlers at build time
#   style-src 'unsafe-inline'          : Vue <style scoped> compiles to inline styles
#   style-src https://fonts.googleapis.com : Inter / JetBrains Mono stylesheet (index.html)
#   font-src  https://fonts.gstatic.com    : Google Fonts font files
#   img-src   data:                    : Leaflet default marker icons
#   img-src   https://*.tile.openstreetmap.org : OSM tile pyramid (a/b/c subdomains)
#   connect-src https://api.alpimonitor.fr : our JSON API
#   frame-ancestors 'none'             : anti-clickjacking, stricter than X-Frame-Options
#   base-uri 'self'                    : block <base> injection
#   form-action 'self'                 : no cross-origin form POSTs
# Trusted Types intentionally omitted: Vue runtime would need rewrites.
# A nonce-based script-src 'strict-dynamic' is the ideal next step but
# requires a Vite plugin + server-side nonce propagation — deferred.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self' https://api.alpimonitor.fr; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

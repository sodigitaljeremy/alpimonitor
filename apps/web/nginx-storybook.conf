server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  server_tokens off;

  # Security headers — Storybook-specific snippet (see the file header for
  # why it differs from the main app's). Re-included in every location
  # below that declares its own add_header, because nginx does not merge
  # parent add_headers into children that introduce new ones.
  include /etc/nginx/storybook-security-headers.conf;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Hashed asset filenames emitted by Storybook's Vite build — safe to
  # cache immutably. Covers the /assets/ prefix that the manager + preview
  # bundles land under.
  location /assets/ {
    try_files $uri =404;
    expires 1y;
    include /etc/nginx/storybook-security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # sb-manager / sb-preview / sb-common chunks share the same immutable
  # naming pattern, served from the static root.
  location ~* ^/(sb-manager|sb-preview|sb-common)/ {
    try_files $uri =404;
    expires 1y;
    include /etc/nginx/storybook-security-headers.conf;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Default SPA-like fallback. Storybook ships both index.html (manager)
  # and iframe.html (preview); both resolve via direct URI match — only
  # deep-linked story paths fall back to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html / iframe.html reference the hashed bundles — never cache.
  location = /index.html {
    include /etc/nginx/storybook-security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }

  location = /iframe.html {
    include /etc/nginx/storybook-security-headers.conf;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
  }
}

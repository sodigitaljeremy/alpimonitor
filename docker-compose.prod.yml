# Production Compose — deployed as a single "Docker Compose" resource in Coolify.
# Coolify injects env vars (POSTGRES_*, DATABASE_URL, CORS_ORIGINS, VITE_API_URL)
# and provisions Traefik labels + TLS when domains are mapped in its UI.
#
# Local smoke test:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#   docker compose -f docker-compose.prod.yml --env-file .env.production up

name: alpimonitor-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - alpimonitor-pgdata:/var/lib/postgresql/data
    networks:
      - alpimonitor-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HOST: 0.0.0.0
      PORT: 3000
    expose:
      - '3000'
    networks:
      - alpimonitor-net
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        # Baked into the Vite bundle at build time — re-deploy web to change it.
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    expose:
      - '80'
    networks:
      - alpimonitor-net
    depends_on:
      - api

volumes:
  alpimonitor-pgdata:

networks:
  alpimonitor-net:

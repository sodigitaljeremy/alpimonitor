# Production Compose — deployed as a single "Docker Compose" resource in Coolify.
# Coolify injects env vars (POSTGRES_*, DATABASE_URL, CORS_ORIGINS, VITE_API_BASE_URL)
# and provisions Traefik labels + TLS when domains are mapped in its UI.
#
# Local smoke test:
#   cp .env.production.example .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production build
#   docker compose -f docker-compose.prod.yml --env-file .env.production up

name: alpimonitor-prod

# Aucun réseau custom n'est déclaré : Docker Compose crée automatiquement
# <project>_default partagé avec Traefik (managed par Coolify). Cela évite
# le multi-homing qui rendait le routage Traefik non-déterministe entre
# rebuilds (incident 504 du 2026-04-22, cf. docs/runbooks/).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - alpimonitor-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      HOST: 0.0.0.0
      PORT: 3000
      # LINDAS ingestion cron — see ADR-007 and src/plugins/ingestion.ts.
      # Set INGESTION_ENABLED=false to disable the cron (e.g. one-off migrations).
      INGESTION_ENABLED: ${INGESTION_ENABLED:-true}
      INGESTION_SCHEDULE: ${INGESTION_SCHEDULE:-*/10 * * * *}
      LINDAS_ARCHIVE_DIR: /app/var/lindas-archive
      # Re-apply the idempotent seed at every boot. Defends against
      # accidental data loss (see entrypoint.sh). Set to false once
      # real operational data must not be overwritten.
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
    expose:
      - '3000'
    volumes:
      - alpimonitor-lindas-archive:/app/var/lindas-archive
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        # Baked into the Vite bundle at build time — re-deploy web to change it.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    restart: unless-stopped
    expose:
      - '80'
    depends_on:
      - api

volumes:
  alpimonitor-pgdata:
  alpimonitor-lindas-archive:
